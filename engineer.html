<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"/>
<title>Engineer — IT Support</title>
<link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#fff;--bg2:#f6f6f4;--bg3:#edede9;--bg4:#e4e4df;
  --fg:#0a0a0a;--fg2:#3a3a38;--fg3:#7a7a75;--fg4:#a8a8a2;
  --border:#e0e0db;--border2:#c8c8c2;--card:#fff;
  --green:#2d7a4f;--red:#b83232;--blue:#1e5fa8;
  --display:'Prompt',sans-serif;--sans:'Prompt',sans-serif;--mono:'Prompt',monospace;
  --ease:cubic-bezier(.22,.61,.36,1);
  --sb-w:240px;
  --safe-top:env(safe-area-inset-top,0px);
  --safe-bottom:env(safe-area-inset-bottom,0px);
}
[data-t="dark"]{
  --bg:#0a0a0a;--bg2:#141413;--bg3:#1e1e1c;--bg4:#282826;
  --fg:#f0f0eb;--fg2:#b8b8b2;--fg3:#7a7a75;--fg4:#4a4a46;
  --border:#252523;--border2:#353532;--card:#141413;
  --green:#4ade80;--red:#f87171;--blue:#60a5fa;
}
html,body{height:100%;background:var(--bg);color:var(--fg);font-family:var(--sans);font-size:14px;-webkit-font-smoothing:antialiased;transition:background .4s,color .4s;overflow:hidden}
a{color:inherit;text-decoration:none}
@keyframes up{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* LOGIN */
#login{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;transition:background .4s}
.lcard{width:100%;max-width:360px;background:var(--card);border:1px solid var(--border);border-radius:12px;padding:32px 24px;animation:up .4s var(--ease);transition:all .4s}
.lcard-logo{text-align:center;margin-bottom:24px}
.lcard-icon{display:inline-flex;width:44px;height:44px;background:var(--fg);border-radius:10px;align-items:center;justify-content:center;font-family:var(--mono);font-size:12px;font-weight:500;color:var(--bg);margin-bottom:10px;transition:all .4s}
.lcard-t{font-family:var(--display);font-size:18px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.lcard-s{font-size:13px;color:var(--fg3);margin-top:2px}
.lf{margin-bottom:10px}
.lf label{display:block;font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);letter-spacing:.1em;text-transform:uppercase;margin-bottom:4px}
.lf .iw{position:relative}
.lf input{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;padding:10px 36px 10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.lf input:focus{border-color:var(--fg)}.lf input::placeholder{color:var(--fg4)}
.eye{position:absolute;right:8px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--fg4);cursor:pointer;font-family:var(--mono);font-size:10px;padding:4px}
.lbtn{width:100%;margin-top:6px;padding:11px;background:var(--fg);color:var(--bg);border:none;border-radius:8px;font-family:var(--display);font-size:14px;font-weight:700;cursor:pointer;transition:all .3s}.lbtn:hover{opacity:.8}.lbtn:disabled{opacity:.3}
.lerr{color:var(--red);font-size:12px;text-align:center;margin-top:6px;min-height:16px}
.llinks{text-align:center;margin-top:14px;font-size:12px;color:var(--fg4)}.llinks a{color:var(--fg3);margin:0 6px}

/* APP */
#app{display:none;height:100vh;overflow:hidden}
#app.on{display:flex}

/* SIDEBAR OVERLAY */
.sb-overlay{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:140;display:none;backdrop-filter:blur(1px)}
.sb-overlay.open{display:block}

/* SIDEBAR */
.sidebar{
  position:fixed;left:0;top:0;height:100%;width:var(--sb-w);
  background:var(--card);border-right:1px solid var(--border);
  z-index:150;display:flex;flex-direction:column;
  transform:translateX(-100%);
  transition:transform .32s var(--ease);
  padding-top:var(--safe-top);
}
.sidebar.open{transform:translateX(0)}
.sb-head{padding:16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-shrink:0}
.sb-logo{width:32px;height:32px;background:var(--fg);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-size:11px;font-weight:500;color:var(--bg);flex-shrink:0;transition:all .4s}
.sb-title{font-family:var(--display);font-size:14px;font-weight:800;flex:1;letter-spacing:-.02em}
.sb-close{background:transparent;border:none;color:var(--fg3);cursor:pointer;font-size:16px;width:28px;height:28px;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:all .2s}
.sb-close:hover{background:var(--bg2);color:var(--fg)}
.sb-user{padding:12px 14px;border-bottom:1px solid var(--border);flex-shrink:0}
.sb-uname{font-size:13px;font-weight:600;color:var(--fg);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sb-urole{font-size:11px;color:var(--fg3);margin-top:1px}
.sb-nav{flex:1;padding:8px;overflow-y:auto;scrollbar-width:none}
.sb-nav::-webkit-scrollbar{display:none}
.nav-item{display:flex;align-items:center;gap:9px;padding:9px 11px;border-radius:8px;border:none;background:transparent;color:var(--fg3);font-family:var(--sans);font-size:13px;font-weight:500;cursor:pointer;width:100%;text-align:left;transition:all .15s;white-space:nowrap}
.nav-item:hover{background:var(--bg2);color:var(--fg)}
.nav-item.on{background:var(--bg3);color:var(--fg);font-weight:600}
.nav-item .ni{font-size:15px;width:18px;text-align:center;flex-shrink:0}
.nav-item .nb{margin-left:auto;background:var(--fg);color:var(--bg);border-radius:5px;font-size:9px;font-weight:700;padding:1px 5px;flex-shrink:0;transition:all .4s}
.sb-foot{padding:10px;border-top:1px solid var(--border);flex-shrink:0;position:relative;padding-bottom:calc(10px + var(--safe-bottom))}

/* PREVIEW ROLE — DROPDOWN (upward) */
.pv-drop{
  position:absolute;bottom:calc(100% + 4px);left:8px;right:8px;
  background:var(--card);border:1.5px solid var(--border2);
  border-radius:10px;box-shadow:0 -8px 24px rgba(0,0,0,.15);
  padding:8px;display:flex;flex-direction:column;gap:2px;
  opacity:0;transform:translateY(6px);pointer-events:none;
  transition:opacity .2s,transform .2s var(--ease);z-index:200;overflow:hidden;
}
.pv-drop.open{opacity:1;transform:translateY(0);pointer-events:all}
.pv-ropt{display:flex;align-items:center;gap:8px;padding:7px 9px;border-radius:7px;cursor:pointer;font-size:12px;color:var(--fg2);border:none;background:transparent;width:100%;text-align:left;transition:background .12s;font-family:var(--sans)}
.pv-ropt:hover{background:var(--bg2)}
.pv-ropt.active{background:var(--fg);color:var(--bg)}
.pv-rdot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.pv-rbadge{font-size:9px;margin-left:auto;padding:2px 6px;border-radius:99px;font-weight:700}
.rb-super{background:#fef3c7;color:#92400e}.rb-manager{background:#ede9fe;color:#5b21b6}
.rb-admin{background:#dbeafe;color:#1e40af}.rb-lead{background:#d1fae5;color:#065f46}
.rb-eng{background:#e0f2fe;color:#0c4a6e}.rb-guest{background:#f1f5f9;color:#475569}
.pv-confirm{display:flex;align-items:center;gap:6px;padding:8px 8px 2px;border-top:1px solid var(--border);margin-top:4px}
.pv-hint{font-size:11px;color:var(--fg4);flex:1;font-family:var(--sans)}
.pv-ok{background:var(--fg);border:none;border-radius:7px;padding:6px 11px;color:var(--bg);font-size:11px;font-weight:700;cursor:pointer;font-family:var(--display);transition:all .2s;display:flex;align-items:center;gap:4px}
.pv-ok:hover{opacity:.8}.pv-ok.go{background:var(--green)}
.pv-timer{position:absolute;bottom:0;left:0;height:2px;background:var(--fg);border-radius:2px;width:100%;transition:width linear}

/* PREVIEW TRIGGER */
.pv-trigger{display:none;align-items:center;gap:7px;padding:8px 10px;background:var(--bg2);border:1.5px solid var(--border);border-radius:8px;cursor:pointer;transition:all .2s;user-select:none;margin-bottom:6px}
.pv-trigger.show{display:flex}
.pv-trigger:hover{background:var(--bg3);border-color:var(--border2)}
.pv-trigger.open{background:var(--fg);border-color:var(--fg)}
.pv-trigger.open .pv-t-icon,.pv-trigger.open .pv-t-label,.pv-trigger.open .pv-t-arrow{color:var(--bg)}
[data-t="dark"] .pv-trigger.open .pv-t-icon{filter:none}
.pv-t-icon{font-size:13px;flex-shrink:0}
.pv-t-label{font-size:11.5px;font-weight:600;color:var(--fg2);flex:1;font-family:var(--display);white-space:nowrap}
.pv-t-role{font-size:10px;background:var(--fg);color:var(--bg);padding:2px 8px;border-radius:99px;font-weight:700;white-space:nowrap;transition:all .2s}
.pv-trigger.open .pv-t-role{background:var(--bg);color:var(--fg)}
.pv-t-arrow{font-size:10px;color:var(--fg4);transition:transform .25s}
.pv-trigger.open .pv-t-arrow{transform:rotate(180deg)}

/* FOOTER BUTTONS */
.sb-foot-row{display:flex;gap:4px}
.sb-fbt{flex:1;padding:8px 6px;background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--fg3);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .15s;text-align:center}
.sb-fbt:hover{background:var(--bg2);color:var(--fg)}
.sb-fbt.danger:hover{background:rgba(184,50,50,.08);border-color:var(--red);color:var(--red)}
.sb-home{display:block;text-align:center;font-size:12px;color:var(--fg3);padding:7px;border-radius:7px;transition:all .15s;margin-bottom:6px}
.sb-home:hover{background:var(--bg2);color:var(--fg)}

/* MAIN AREA */
.main-area{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;display:flex;align-items:center;gap:8px;padding:10px 16px;padding-top:calc(var(--safe-top) + 10px);background:var(--bg);border-bottom:1px solid var(--border);transition:all .4s;flex-shrink:0}
.btn-hamburger{background:transparent;border:1px solid var(--border);border-radius:7px;color:var(--fg3);font-size:15px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0}
.btn-hamburger:hover{background:var(--bg2);color:var(--fg)}
.top-t{font-family:var(--display);font-size:14px;font-weight:800;flex:1;color:var(--fg);letter-spacing:-.02em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.top-clock{font-family:var(--mono);font-size:11px;color:var(--fg4);flex-shrink:0}
.smb{padding:5px 10px;background:transparent;border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;flex-shrink:0;white-space:nowrap}
.smb:hover{background:var(--bg2);color:var(--fg)}

/* GPS STATUS BAR */
#gps-status-bar{display:flex;align-items:center;gap:8px;padding:5px 16px;font-size:12px;font-weight:500;background:var(--bg2);border-bottom:1px solid var(--border);transition:all .4s;flex-shrink:0}
.gps-pulse{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite;flex-shrink:0}
.gps-pulse.off{background:var(--red);animation:none}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:14px;padding-bottom:calc(14px + var(--safe-bottom));-webkit-overflow-scrolling:touch}
.content-inner{max-width:680px;margin:0 auto}

/* STATS */
.eng-stats{padding:12px 14px 0;background:var(--bg)}
.stat-grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
@media(max-width:1024px){.stat-grid-4{grid-template-columns:repeat(2,1fr)}}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;text-align:left;transition:all .4s;position:relative;overflow:hidden}
.stat-box::after{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:12px 12px 0 0}
.stat-box.sb-blue::after{background:#6366f1}
.stat-box.sb-amber::after{background:#f59e0b}
.stat-box.sb-green::after{background:#22c55e}
.stat-box.sb-dark::after{background:var(--fg)}
.stat-val{font-family:var(--display);font-size:32px;font-weight:800;letter-spacing:-.05em;color:var(--fg);line-height:1}
.stat-lbl{font-size:11px;color:var(--fg3);font-weight:600;margin-top:4px}
.stat-bar{height:4px;background:var(--bg3);border-radius:99px;margin-top:10px;overflow:hidden}
.stat-fill{height:100%;border-radius:99px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
/* Dashboard overview section */
.eng-overview{padding:10px 14px 0}
.ov-greeting{font-size:13px;font-weight:700;color:var(--fg2);margin-bottom:2px}
.ov-sub{font-size:11px;color:var(--fg4)}
/* ── NE4: Desktop sidebar always visible (same as Admin) ── */
@media(min-width:1025px){
  .sidebar{transform:translateX(0)!important;position:relative;height:100%}
  .sb-overlay{display:none!important}
  .sb-close{display:none!important}
  #app{display:flex}
  .main-area{flex:1}
  .tabs{display:none!important}
  .eng-stats{margin-top:4px}
}
.es{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:12px;text-align:center;transition:all .4s;cursor:pointer}
.es:hover{border-color:var(--border2)}
.es-v{font-family:var(--display);font-size:24px;font-weight:800;color:var(--fg);letter-spacing:-.03em}
.es-l{font-size:10px;color:var(--fg4);margin-top:1px;font-family:var(--display);font-weight:600;text-transform:uppercase;letter-spacing:.06em}

/* JOB CARDS */
.jcard{background:var(--card);border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:6px;transition:all .25s var(--ease);animation:up .3s var(--ease) both;position:relative;overflow:hidden}
.jcard:hover{border-color:var(--border2)}
@keyframes stampIn{0%{opacity:0;transform:rotate(-8deg) scale(1.4)}60%{opacity:1;transform:rotate(-8deg) scale(0.92)}80%{transform:rotate(-8deg) scale(1.04)}100%{transform:rotate(-8deg) scale(1)}}
.stamp-overlay{position:absolute;top:10px;right:10px;transform:rotate(-8deg);pointer-events:none;z-index:10;animation:stampIn .3s cubic-bezier(.22,.61,.36,1) both}
.stamp-badge{border:3px solid currentColor;border-radius:6px;padding:3px 10px;font-family:var(--display);font-size:11px;font-weight:800;letter-spacing:.12em;text-transform:uppercase;opacity:.75;white-space:nowrap;display:inline-block}
.stamp-working{color:#e67e22;background:rgba(230,126,34,.07)}
.stamp-review{color:#2b5ea8;background:rgba(43,94,168,.07)}
.stamp-done{color:#2d7a4f;background:rgba(45,122,79,.07)}
.jc-top{display:flex;align-items:flex-start;gap:6px;margin-bottom:6px}
.jc-id{font-family:var(--mono);font-size:10px;color:var(--fg4)}
.jc-type{font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);letter-spacing:-.02em}
.pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;background:var(--bg3);color:var(--fg2);font-family:var(--mono);transition:all .4s}
.jc-meta{font-size:12px;color:var(--fg3);display:flex;flex-wrap:wrap;gap:8px;margin-bottom:6px}
.jc-detail{font-size:13px;color:var(--fg2);line-height:1.5;background:var(--bg2);border-radius:6px;padding:8px 10px;margin-bottom:8px;transition:background .4s}
.jc-btns{display:flex;gap:4px;flex-wrap:wrap}
.jc-b{flex:1;min-width:80px;padding:8px;border-radius:6px;border:1px solid var(--border);background:transparent;color:var(--fg3);font-family:var(--display);font-size:12px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;position:relative;overflow:hidden;user-select:none}
.jc-b:hover{background:var(--bg2);color:var(--fg)}
.jc-b:active{transform:scale(.94);opacity:.8}
.jc-b.pri{background:var(--fg);color:var(--bg);border-color:var(--fg);box-shadow:0 4px 0 rgba(0,0,0,.25),0 2px 8px rgba(0,0,0,.15)}
.jc-b.pri:hover{opacity:.9;transform:translateY(-1px);box-shadow:0 6px 0 rgba(0,0,0,.2),0 4px 12px rgba(0,0,0,.15)}
.jc-b.pri:active{transform:translateY(3px) scale(.97);box-shadow:0 1px 0 rgba(0,0,0,.2);opacity:1}
.jc-b.danger{color:var(--red);border-color:var(--red)}.jc-b.danger:hover{background:var(--red);color:var(--bg)}
.timer-bar{background:var(--bg2);border:1px solid var(--border);border-radius:8px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;gap:10px;transition:all .4s}
.timer-val{font-family:var(--mono);font-size:18px;font-weight:500;color:var(--fg);letter-spacing:.02em}
.timer-label{font-size:11px;color:var(--fg4);flex:1}
.gps-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 1.5s infinite}

/* EMERGENCY */
.em-search{margin-bottom:12px}
.em-search input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;color:var(--fg);font-family:var(--sans);font-size:14px;outline:none;transition:all .3s}
.em-search input:focus{border-color:var(--fg)}
.em-search input::placeholder{color:var(--fg4)}
.em-cat{margin-bottom:8px}
.em-cat-h{padding:10px 12px;background:var(--card);border:1px solid var(--border);border-radius:8px;cursor:pointer;font-family:var(--display);font-size:14px;font-weight:700;color:var(--fg);display:flex;align-items:center;justify-content:space-between;transition:all .2s;letter-spacing:-.02em}
.em-cat-h:hover{background:var(--bg2)}
.em-cat-h .arrow{transition:transform .3s var(--ease);font-family:var(--mono);font-size:10px;color:var(--fg4)}
.em-cat.open .arrow{transform:rotate(90deg)}
.em-list{max-height:0;overflow:hidden;transition:max-height .4s var(--ease)}
.em-cat.open .em-list{max-height:1200px}
.em-item{display:flex;align-items:center;padding:8px 12px;border-bottom:1px solid var(--border);transition:all .2s}
.em-item:last-child{border-bottom:none}
.em-item:hover{background:var(--bg2)}
.em-name{flex:1;font-size:13px;color:var(--fg);font-weight:500}
.em-phone{font-family:var(--mono);font-size:14px;font-weight:500;color:var(--fg);text-decoration:none;padding:6px 12px;border:1px solid var(--border);border-radius:6px;transition:all .2s}
.em-phone:hover{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.empty{text-align:center;padding:32px 14px}
.empty-t{font-family:var(--display);font-size:15px;font-weight:700;color:var(--fg3)}
.empty-d{font-size:12px;color:var(--fg4);margin-top:2px}

/* MODAL */
.mod-bg{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;display:none;align-items:center;justify-content:center;padding:16px}
.mod-bg.on{display:flex}
[data-t="dark"] .mod-bg.on{background:rgba(0,0,0,.6)}
.mod{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px;width:100%;max-width:420px;animation:up .2s var(--ease);max-height:90vh;overflow-y:auto;transition:all .4s}
.mod-t{font-family:var(--display);font-size:16px;font-weight:800;margin-bottom:12px;color:var(--fg);letter-spacing:-.02em}
.fg{margin-bottom:8px}
.fg label{font-family:var(--display);font-size:10px;font-weight:700;color:var(--fg4);margin-bottom:3px;display:block;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg textarea{width:100%;background:var(--bg2);border:1.5px solid var(--border);border-radius:7px;padding:9px 10px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.fg input:focus,.fg textarea:focus{border-color:var(--fg)}
.fg input::placeholder,.fg textarea::placeholder{color:var(--fg4)}
.fg textarea{resize:none;min-height:80px;line-height:1.5}
.mod-f{display:flex;gap:5px;margin-top:12px}
.bp{flex:1;padding:10px;background:var(--fg);color:var(--bg);border:none;border-radius:7px;font-family:var(--display);font-size:13px;font-weight:700;cursor:pointer;transition:all .3s}.bp:hover{opacity:.8}
.bo2{flex:1;padding:10px;background:var(--bg2);color:var(--fg);border:1px solid var(--border);border-radius:7px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .3s}
.toast{position:fixed;top:14px;right:14px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:13px;z-index:999;box-shadow:0 4px 20px rgba(0,0,0,.08);animation:up .2s var(--ease);display:none;color:var(--fg);font-weight:500;transition:all .4s}

/* ═══ HISTORY PAGE (admin-style table + pagination) ═══ */
.hist-hdr{display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:14px}
.hist-title{font-family:var(--display);font-size:16px;font-weight:800;letter-spacing:-.02em;color:var(--fg)}
.hist-count{font-size:12px;color:var(--fg3);margin-top:2px}
.hist-filters{display:flex;gap:5px;flex-wrap:wrap;margin-bottom:10px;align-items:center}
.hist-sel{background:var(--card);border:1.5px solid var(--border);border-radius:7px;padding:7px 10px;color:var(--fg);font-family:var(--sans);font-size:12px;outline:none;cursor:pointer;transition:all .3s;appearance:none}
.hist-sel:focus{border-color:var(--fg)}
.hist-srch{flex:1;min-width:140px;position:relative}
.hist-srch input{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:7px;padding:7px 10px 7px 28px;color:var(--fg);font-family:var(--sans);font-size:13px;outline:none;transition:all .3s}
.hist-srch input:focus{border-color:var(--fg)}

.htbl-wrap{overflow-x:auto;border:1px solid var(--border);border-radius:10px;transition:border-color .4s}
.htbl{width:100%;border-collapse:collapse;font-size:13px}
.htbl th{padding:9px 10px;background:var(--bg2);color:var(--fg3);font-weight:700;text-align:left;border-bottom:1px solid var(--border);font-family:var(--display);font-size:10px;text-transform:uppercase;letter-spacing:.06em;white-space:nowrap;transition:background .4s,border-color .4s}
.htbl td{padding:9px 10px;border-bottom:1px solid var(--border);color:var(--fg);vertical-align:middle;transition:background .4s,border-color .4s}
.htbl tr:last-child td{border-bottom:none}
.htr:hover td{background:var(--bg2);cursor:pointer}
/* Pagination */
.pg{display:flex;align-items:center;gap:3px;flex-wrap:wrap;margin-top:10px;justify-content:flex-end}
.pg-btn{padding:5px 9px;background:var(--card);border:1px solid var(--border);border-radius:6px;color:var(--fg3);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;white-space:nowrap}
.pg-btn:hover:not(:disabled){background:var(--bg2);color:var(--fg);border-color:var(--border2)}
.pg-btn.on{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.pg-btn:disabled{opacity:.35;cursor:default}
.pg-info{font-size:11px;color:var(--fg4);margin-right:4px;font-family:var(--display);flex:1}
/* Status pills */
.hs-pill{display:inline-flex;padding:2px 8px;border-radius:4px;font-size:10px;font-weight:600;font-family:var(--mono);white-space:nowrap}
.hs-wait{background:rgba(245,158,11,.15);color:#b45309}.hs-work{background:rgba(99,102,241,.15);color:#4338ca}
.hs-rev{background:rgba(37,99,235,.15);color:#1d4ed8}.hs-done{background:rgba(22,163,74,.15);color:#15803d}
.hs-cancel{background:rgba(220,38,38,.15);color:#b91c1c}
.hs-parts{background:rgba(168,85,247,.15);color:#7e22ce}.hs-vendor{background:rgba(236,72,153,.15);color:#be185d}
[data-t="dark"] .hs-wait{background:rgba(251,191,36,.12);color:#fbbf24}
[data-t="dark"] .hs-work{background:rgba(129,140,248,.12);color:#818cf8}
[data-t="dark"] .hs-rev{background:rgba(96,165,250,.12);color:#60a5fa}
[data-t="dark"] .hs-done{background:rgba(74,222,128,.12);color:#4ade80}
[data-t="dark"] .hs-cancel{background:rgba(248,113,113,.12);color:#f87171}
[data-t="dark"] .hs-parts{background:rgba(192,132,252,.14);color:#c084fc}
[data-t="dark"] .hs-vendor{background:rgba(244,114,182,.14);color:#f472b6}
/* Brand badge */
.br-badge-sm{padding:2px 8px;border-radius:4px;font-family:var(--mono);font-size:10px;font-weight:700;background:var(--bg3);color:var(--fg3);white-space:nowrap;transition:all .4s}
/* Responsive */
@media(max-width:640px){.htbl thead{display:none}.htr{display:block;margin-bottom:4px;border:1px solid var(--border);border-radius:8px}.htr td{display:block;border:none;padding:4px 10px}.htr td:first-child{padding-top:10px}.htr td:last-child{padding-bottom:10px}.htbl-wrap{border:none}.pg{justify-content:center}}
/* ── Job Table Action Buttons ── */
.jt-act{display:flex;gap:3px;align-items:center;flex-wrap:nowrap}
.jt-b{padding:4px 9px;border-radius:5px;border:1px solid var(--border);background:transparent;color:var(--fg3);font-family:var(--display);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.jt-b:hover{background:var(--bg2);color:var(--fg);border-color:var(--border2)}
.jt-b.accept{background:var(--fg);color:var(--bg);border-color:var(--fg)}
.jt-b.accept:hover{opacity:.85}

.jt-b.start:hover{opacity:.85}

.jt-timer{font-family:var(--mono);font-size:10px;color:#16a34a;font-weight:700;letter-spacing:.03em}
[data-t="dark"] .jt-timer{color:#4ade80}

/* PREVIEW ROLE LOADING OVERLAY */
#pv-overlay{position:fixed;inset:0;background:#fff;z-index:9999;display:none;flex-direction:column;align-items:center;justify-content:center}
[data-t="dark"] #pv-overlay{background:#0a0a0a}
.pvo-line1{font-size:11px;font-weight:700;letter-spacing:.25em;text-transform:uppercase;color:#bbb;margin-bottom:36px}
.pvo-slot{position:relative;height:56px;display:flex;align-items:center;justify-content:center;min-width:240px;margin-bottom:14px;perspective:600px}
.pvo-box{background:#111;color:#fff;font-size:24px;font-weight:800;padding:7px 24px;border-radius:10px;position:absolute;backface-visibility:hidden;transform-origin:center bottom}
[data-t="dark"] .pvo-box{background:#f0f0eb;color:#0a0a0a}
.pvo-box.pvo-new{transform:rotateX(90deg);opacity:0}
.pvo-slot.do-flip .pvo-box.pvo-old{animation:foldOut .32s cubic-bezier(.55,0,1,.45) forwards}
.pvo-slot.do-flip .pvo-box.pvo-new{animation:foldIn .32s cubic-bezier(0,.55,.45,1) .28s forwards}
@keyframes foldOut{0%{transform:rotateX(0deg);opacity:1}100%{transform:rotateX(-80deg);opacity:0}}
@keyframes foldIn{0%{transform:rotateX(80deg);opacity:0}100%{transform:rotateX(0deg);opacity:1}}
.pvo-static{font-size:14px;color:#bbb;font-weight:700;letter-spacing:.05em;margin-bottom:14px;min-height:20px;text-align:center}
.pvo-dots{display:flex;gap:8px;margin-top:36px}
.pvo-dot{width:8px;height:8px;border-radius:50%;background:#eee}

.pvo-dot:nth-child(1){animation:dotP 1.2s 0s infinite}
.pvo-dot:nth-child(2){animation:dotP 1.2s .2s infinite}
.pvo-dot:nth-child(3){animation:dotP 1.2s .4s infinite}
@keyframes dotP{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1.2)}}
@keyframes pvOut{0%{opacity:1;transform:scale(1)}100%{opacity:0;transform:scale(1.03)}}

/* ── SKELETON ── */

.sk-line{height:13px;margin-bottom:8px}.sk-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:14px;margin-bottom:8px}

/* ── TABS ── */

.tab-btn{padding:9px 16px;border:none;background:none;color:var(--fg3);cursor:pointer;font-family:var(--sans);font-size:13px;font-weight:500;position:relative;white-space:nowrap;transition:color .2s}
.tab-btn:hover{color:var(--fg)}
.tab-btn.on{color:var(--fg);font-weight:700}
.tab-btn.on::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:2px;background:var(--fg);border-radius:2px 2px 0 0}
.tab-panel{display:none}.tab-panel.on{display:block;animation:up .25s var(--ease)}

/* ── ACCORDION ── */
.acc-list{display:flex;flex-direction:column;gap:5px}
.acc-item{background:var(--card);border:1px solid var(--border);border-radius:10px;overflow:hidden}
.acc-item.open{border-color:var(--border2)}
.acc-head{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;cursor:pointer;background:var(--card);transition:background .2s;user-select:none}
.acc-head:hover{background:var(--bg2)}
.acc-q{font-size:13px;font-weight:600;color:var(--fg)}
.acc-ic{width:20px;height:20px;border-radius:50%;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--fg3);transition:transform .25s,background .2s,color .2s;flex-shrink:0}
.acc-item.open .acc-ic{transform:rotate(45deg);background:var(--fg);color:var(--bg)}
.acc-body{max-height:0;overflow:hidden;transition:max-height .35s var(--ease),padding .3s;background:var(--bg2);padding:0 14px;font-size:12px;color:var(--fg3);line-height:1.7}
.acc-item.open .acc-body{max-height:300px;padding:10px 14px}

/* ── TOGGLE ── */
.tog-list{display:flex;flex-direction:column;gap:6px}
.tog-row{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:var(--card);border:1px solid var(--border);border-radius:10px;cursor:pointer;transition:border-color .2s}
.tog-row:hover{border-color:var(--border2)}
.tog-label{font-size:13px;font-weight:600;color:var(--fg)}
.tog-sub{font-size:11px;color:var(--fg3);margin-top:2px}
.tog{width:40px;height:22px;background:var(--bg3);border:1px solid var(--border);border-radius:99px;position:relative;transition:background .25s;flex-shrink:0}
.tog.on{background:var(--fg);border-color:var(--fg)}
.tog::after{content:'';position:absolute;width:16px;height:16px;border-radius:50%;background:var(--bg);top:2px;left:2px;transition:transform .25s var(--spring);box-shadow:0 1px 4px rgba(0,0,0,.2)}
.tog.on::after{transform:translateX(18px)}

/* ── STATS PROGRESS ── */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px;margin-bottom:14px}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;text-align:center;transition:all .4s}
.stat-val{font-family:var(--display);font-size:24px;font-weight:800;letter-spacing:-.04em;color:var(--fg)}
.stat-lbl{font-size:10px;color:var(--fg4);font-weight:700;text-transform:uppercase;letter-spacing:.08em;margin-top:2px}
.stat-bar{height:3px;background:var(--bg3);border-radius:99px;margin-top:8px;overflow:hidden}
.stat-fill{height:100%;border-radius:99px;transition:width 1s var(--ease)}

/* ── MORPH MODAL enhancement ── */
.job-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.job-card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:var(--fg);border-radius:3px 0 0 3px;transform:scaleY(0);transition:transform .25s var(--spring)}
.job-card:hover::before{transform:scaleY(1)}
.job-card:hover{border-color:var(--border2);transform:translateX(3px);box-shadow:0 4px 16px rgba(0,0,0,.06)}
[data-t="dark"] .job-card:hover{box-shadow:0 4px 16px rgba(0,0,0,.25)}
.job-card-id{font-family:var(--mono);font-size:10px;color:var(--fg4);margin-bottom:4px}
.job-card-title{font-size:14px;font-weight:700;color:var(--fg);margin-bottom:6px;line-height:1.4}
.job-card-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
</style>

<script>
let AUTH=null,tickets=[],tab='active',sse=null,gpsWatch=null,_gpsActive=true; // GPS_DISABLED
const esc=s=>String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
function statusLabel(s){return(s||'--').replace(/[⏱️⚙️✅❌📦🔧]/g,'').trim();}
function cleanBranch(code){return(code||'—').replace(/\s*มี\s*\d+\s*เครื่อง.*/i,'').trim()||'—';}

// ═══════════════════════════════════════════════════════════
// BRANCH MAP — ตัวเชื่อมข้อมูลสาขา (ให้ตรงกับ admin.html)
// ═══════════════════════════════════════════════════════════
let branchMap = {};
function buildBranchMap(){
  branchMap = {};
  (window._allBranches||[]).forEach(b=>{
    const code = String(b.code||'').trim();
    if(code) branchMap[code] = b;
  });
}
function formatBranch(code){
  const c = String(code||'').trim();
  if(!c) return '—';
  const b = branchMap[c];
  if(!b) return cleanBranch(code);
  const label = (b.shortCode||b.short_code||b.nameEn||b.name_en||b.nameTh||b.name_th||'').trim();
  return label ? `${c} - ${label}` : c;
}
function branchPhonesHtml(code){
  const b = branchMap[String(code||'').trim()];
  if(!b) return '';
  const store = (b.storePhone||b.store_phone||'').trim();

/* ═══ AUTO RE-LOGIN ══════════════════════════════════════════ */
let _relogging=false;
async function autoRelogin(){
  if(_relogging)return false;_relogging=true;
  try{
    const c=JSON.parse(localStorage.getItem('eng_cred')||'null');
    if(!c)return false;
    const d=await fetch('/api/auth/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(c)}).then(r=>r.json());
    if(!d.ok)return false;
    AUTH={token:d.token,user:d.user};localStorage.setItem('eng_auth',JSON.stringify(AUTH));return true;
  }catch(_){return false;}finally{_relogging=false;}
}

async function api(p,o={}){
  const h={'Content-Type':'application/json',...(o.headers||{})};
  if(AUTH?.token)h['Authorization']='Bearer '+AUTH.token;
  let res=await fetch(p,{...o,headers:h}).catch(()=>null);
  if(!res)return{ok:false,error:'Network error'};
  if(res.status===401){
    const ok=await autoRelogin();
    if(ok){h['Authorization']='Bearer '+AUTH.token;res=await fetch(p,{...o,headers:h}).catch(()=>null);if(!res)return{ok:false,error:'Network error'};}
  }
  return res.json().catch(()=>({ok:false,error:'Invalid response'}));
}

/* ═══ GPS TRACKING ═══════════════════════════════════════════ */
// ── GPS Tracking — pin trail ทุก 10 นาทีที่เคลื่อนไหว ──────
let _gpsTrailTimer = null;
let _lastGPSSent   = null; // {lat, lng, time}

function startGPSTracking(){
  if(!('geolocation' in navigator)){updateGPSBar(false,'GPS ไม่รองรับบนอุปกรณ์นี้');return;}
  if(gpsWatch!==null)navigator.geolocation.clearWatch(gpsWatch);
  if(_gpsTrailTimer){clearInterval(_gpsTrailTimer);_gpsTrailTimer=null;}

  gpsWatch=navigator.geolocation.watchPosition(
    pos=>{
      _gpsActive=true;
      const{latitude:lat,longitude:lng,accuracy}=pos.coords;
      _lastGPS={lat,lng};
      updateGPSBar(true,`${lat.toFixed(5)}, ${lng.toFixed(5)}`);
      // บันทึก GPS ครั้งแรกทันที
      if(!_lastGPSSent){
        _sendGPSPin(lat,lng,accuracy,'first');
      }
    },
    err=>{
      _gpsActive=false;
      const msgs={1:'ไม่ได้รับอนุญาต GPS',2:'ไม่พบตำแหน่ง',3:'หมดเวลา GPS'};
      updateGPSBar(false,msgs[err.code]||'GPS ไม่พร้อมใช้งาน');
    },
    {enableHighAccuracy:true,maximumAge:30000,timeout:15000}
  );

  // Trail pin ทุก 10 นาที — ส่งเฉพาะถ้าตำแหน่งเปลี่ยน (>50m)
  _gpsTrailTimer=setInterval(()=>{
    if(!_lastGPS||!_gpsActive)return;
    const{lat,lng}=_lastGPS;
    if(_lastGPSSent){
      const dist=_gpsDistance(_lastGPSSent.lat,_lastGPSSent.lng,lat,lng);
      if(dist<0.05)return; // <50m ไม่ส่ง
    }
    _sendGPSPin(lat,lng,null,'trail');
  },10*60*1000); // 10 นาที
}

function _sendGPSPin(lat,lng,accuracy,type){
  _lastGPSSent={lat,lng,time:Date.now()};
  api('/api/gps',{method:'POST',body:JSON.stringify({
    latitude:lat,longitude:lng,accuracy:accuracy||null,
    engineer_name:AUTH.user.name,user_id:AUTH.user.id,
    brand:AUTH.user.brand,pin_type:type||'trail'
  })}).catch(()=>{});
}

function updateGPSBar(ok, msg){
  const dot  = document.getElementById('gps-dot');
  const text = document.getElementById('gps-text');
  const bar  = document.getElementById('gps-status-bar');
  if(!dot||!text||!bar) return;
  if(ok){
    dot.className='gps-pulse';
    text.style.color='var(--green)';
    text.textContent='📍 GPS Active — '+msg;
    bar.style.background='rgba(45,122,79,.08)';
    bar.style.borderBottomColor='rgba(45,122,79,.2)';
  } else {
    dot.className='gps-pulse off';
    text.style.color='var(--red)';
    text.textContent='⚠️ '+msg;
    bar.style.background='rgba(184,50,50,.06)';
    bar.style.borderBottomColor='rgba(184,50,50,.15)';
  }
}

// Haversine distance (km)
function _gpsDistance(lat1,lng1,lat2,lng2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLng=(lng2-lng1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}

function stopGPSTracking(){
  if(gpsWatch!==null){navigator.geolocation.clearWatch(gpsWatch);gpsWatch=null;}
  if(_gpsTrailTimer){clearInterval(_gpsTrailTimer);_gpsTrailTimer=null;}
  _gpsActive=false;_lastGPSSent=null;
  updateGPSBar(false,'GPS หยุดทำงาน');
}

/* ═══ DATA ════════════════════════════════════════════════════ */
async function loadTickets(){
  try{
    const d=await api('/api/tickets');
    if(d.ok){
      const my=AUTH.user.name, role=AUTH.user.role, myBrand=AUTH.user.brand;
      const canSeeAll=['admin','superadmin','manager'].includes(role);

      let list=d.tickets||[];

      // กรอง brand ก่อน (ยกเว้น admin/superadmin/manager เห็นทุก brand)
      if(!canSeeAll && myBrand && myBrand !== 'ALL'){
        list=list.filter(t=>!t.brand||t.brand===myBrand);
      }

      // engineer เห็นเฉพาะงานที่ assigned ให้ตัวเอง + งานที่ยังไม่ assigned (รอรับ) ใน brand ตัวเอง
      // lead_engineer เห็นทุกงานใน brand ตัวเอง
      if(!canSeeAll && role==='engineer'){
        list=list.filter(t=>
          t.engineerName===my || t.assignedTo===my || t.assigned_to===my ||
          (!t.engineerName && !t.assignedTo)  // งานรอรับยังไม่ assigned
        );
      }

      tickets=list;
    }
  }catch(e){}
}
async function doRefresh(){
  // Sync fresh user data (role/brand อาจถูก admin เปลี่ยน)
  try{
    const d=await api('/api/auth/me');
    if(d.ok&&d.user){
      AUTH.user={...AUTH.user,...d.user};
      localStorage.setItem('eng_auth',JSON.stringify(AUTH));
    }

  await loadTickets();
  render();
  toast('Refreshed');
}

function startClock(){

function startWorkTimers(){
  if(window._workTimerInterval)clearInterval(window._workTimerInterval);
  window._workTimerInterval=setInterval(()=>{
    const stKey='eng_st_'+(AUTH?.user?.id||'x');
    let sv={};try{sv=JSON.parse(localStorage.getItem(stKey)||'{}');}catch(_){}
    tickets.filter(x=>/ระหว่าง/.test(x.status||'')).forEach(t=>{
      const el=document.getElementById('timer-'+t._recordId);if(!el)return;
      const sa=sv[t._recordId]||null;
      if(!sa){el.textContent='00:00:00';return;}
      // ✅ รองรับ Unix timestamp (number) และ string — ป้องกัน timezone bug
      const startMs=typeof sa==='number'?sa:Number(sa)||Date.now();
      const ms=Date.now()-startMs;
      if(ms<0){el.textContent='00:00:00';return;}
      const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
      el.textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
    });
  },1000);
}

async function doSetStuckStatus(rid){
  const reasonEl=document.querySelector('input[name="stuck-reason"]:checked');
  const reason=reasonEl?reasonEl.value:'รออะไหล่';
  const note=(document.getElementById('stuck-note')?.value||'').trim();
  const emoji=reason==='รออะไหล่'?'📦':'🔧';
  const statusValue=`${reason} ${emoji}`;
  const t=tickets.find(x=>x._recordId===rid);

  const btn=document.querySelector('.mod-f .bp');
  const orig=btn?.innerHTML||'ยืนยัน';
  if(btn){btn.disabled=true;btn.innerHTML='<span class="spin"></span> กำลังบันทึก...';}

  try{
    const body={status:statusValue,brand:t?.brand||''};
    if(note)body.stuck_note=note;
    const d=await api(`/api/tickets/${rid}/status`,{method:'PATCH',body:JSON.stringify(body)});
    if(!d.ok)throw new Error(d.error||'Failed');

    tickets=tickets.map(x=>x._recordId===rid?{...x,status:statusValue}:x);
    // เก็บ note ไว้แสดงใน detail (optimistic, ไม่รอ reload)
    if(note){
      try{
        const stKey='eng_stuck_note_'+(AUTH?.user?.id||'x');
        const sv=JSON.parse(localStorage.getItem(stKey)||'{}');
        sv[rid]=note;
        localStorage.setItem(stKey,JSON.stringify(sv));
      }catch(_){}
    }
    closeMod();render();
    toast(`${emoji} แจ้งสถานะ "${reason}" แล้ว — Admin ได้รับแจ้งเตือน`);
  }catch(e){
    if(btn){btn.disabled=false;btn.innerHTML=orig;}
    toast('Error: '+e.message);
  }
}

async function doStartWork(rid){
  try{
    // ✅ เก็บเป็น Unix timestamp (ms) — ป้องกัน timezone bug
    const startedAtMs = Date.now();
    // API รับ ISO string
    const startedAtISO = new Date(startedAtMs).toISOString();
    const t=tickets.find(x=>x._recordId===rid);
    const body={status:'อยู่ระหว่างดำเนินการ ⚙️',brand:t?.brand||''};

    if(_lastGPS){body.completed_lat=_lastGPS.lat;body.completed_lng=_lastGPS.lng;}
    body.started_at=startedAtISO;

    const ctrl=new AbortController();
    const timer=setTimeout(()=>ctrl.abort(),15000);
    let d;
    try{
      const r=await fetch(`/api/tickets/${rid}/status`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(AUTH?.token||'')},body:JSON.stringify(body),signal:ctrl.signal});
      d=await r.json();
    }catch(e){
      if(e.name==='AbortError'){
        delete body.started_at;
        try{const r2=await fetch(`/api/tickets/${rid}/status`,{method:'PATCH',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(AUTH?.token||'')},body:JSON.stringify(body)});d=await r2.json();}
        catch(_){d={ok:false,error:'Network timeout'};}
      } else d={ok:false,error:e.message};
    }
    clearTimeout(timer);
    if(!d?.ok)throw new Error(d?.error||'Failed');

    // ✅ บันทึก Unix ms ลง localStorage — ไม่มีปัญหา timezone
    try{
      const stKey='eng_st_'+(AUTH?.user?.id||'x');
      const sv=JSON.parse(localStorage.getItem(stKey)||'{}');
      delete sv[rid];
      sv[rid]=startedAtMs;  // Unix timestamp ms
      localStorage.setItem(stKey,JSON.stringify(sv));
    }catch(_){}

    tickets=tickets.map(x=>x._recordId===rid?{...x,status:'อยู่ระหว่างดำเนินการ ⚙️',started_at:startedAtISO}:x);
    render();
    toast('🚀 เริ่มงานแล้ว!');

    if(_lastGPS)api('/api/gps',{method:'POST',body:JSON.stringify({latitude:_lastGPS.lat,longitude:_lastGPS.lng,ticket_id:rid,engineer_name:AUTH.user.name,user_id:AUTH.user.id,brand:AUTH.user.brand})}).catch(()=>{});
    loadTickets().then(render).catch(()=>{});
  }catch(e){toast('Error: '+e.message);}
}

async function doSubmit(rid){
  const wd=(document.getElementById('m-wd')?.value||'').trim();
  if(!wd){toast('กรุณากรอกรายละเอียดงาน');return;}
  const pt=(document.getElementById('m-pt')?.value||'').trim();
  const whRaw=(document.getElementById('m-wh')?.value||'').trim();
  // แปลง HH:MM:SS → ชั่วโมงทศนิยม ถ้าเป็น format นาฬิกา
  let wh=whRaw;
  if(whRaw.includes(':')){
    const parts=whRaw.split(':').map(Number);
    if(parts.length===3) wh=((parts[0]*3600+parts[1]*60+parts[2])/3600).toFixed(2);
    else if(parts.length===2) wh=((parts[0]*60+parts[1])/60).toFixed(2);
  }
  try{
    // Upload photos first
    const uploadedUrls=[];
    for(const p of (window._engPhotos||[])){
      const fd=new FormData();
      fd.append('file',p.file);
      fd.append('ticket_id',rid);
      fd.append('role','engineer');
      const up=await fetch('/api/upload',{method:'POST',headers:{'Authorization':'Bearer '+(AUTH?.token||'')},body:fd});
      const uj=await up.json();
      if(uj.url) uploadedUrls.push(uj.url);
    }
    const d=await api(`/api/tickets/${rid}/engineer-submit`,{method:'PATCH',body:JSON.stringify({workDetail:wd,partsUsed:pt,workHours:wh,completed_lat:window._completeLat||null,completed_lng:window._completeLng||null,images:uploadedUrls.length?JSON.stringify(uploadedUrls):undefined})});
    if(!d.ok)throw new Error(d.error||'Failed');
    try{const sv=JSON.parse(localStorage.getItem('eng_st_'+(AUTH?.user?.id||'x'))||'{}');delete sv[rid];localStorage.setItem('eng_st_'+(AUTH?.user?.id||'x'),JSON.stringify(sv));}catch(_){}
    tickets=tickets.map(x=>x._recordId===rid?{...x,workDetail:wd,partsUsed:pt,workHours:wh,status:'ตรวจงาน '}:x);
    window._engPhotos=[];
    closeMod();render();toast('ส่งงานสำเร็จ ✅');
  }catch(e){toast('Error: '+e.message);}
}

function openDetail(rid){
  const t=tickets.find(x=>x._recordId===rid);if(!t)return;
  // Extract GPS from location field — format "[GPS:lat,lng]" or "[DB:lat,lng]"
  let branchLat='', branchLng='';
  const gpsMatch=(t.location||'').match(/\[(GPS|DB):([-\d.]+),([-\d.]+)\]/);
  if(gpsMatch){branchLat=gpsMatch[2];branchLng=gpsMatch[3];}

  // Build Google Maps navigation URL (from current GPS → branch location)
  function getMapUrl(){
    const dest=branchLat&&branchLng?`${branchLat},${branchLng}`:`${esc(t.location||'')}`;
    if(!branchLat&&!branchLng) return '';
    if(navigator.geolocation){
      return new Promise(res=>{
        navigator.geolocation.getCurrentPosition(
          pos=>res(`https://www.google.com/maps/dir/?api=1&origin=${pos.coords.latitude},${pos.coords.longitude}&destination=${dest}&travelmode=driving`),
          ()=>res(`https://www.google.com/maps/search/?api=1&query=${dest}`),
          {enableHighAccuracy:true,timeout:5000}
        );
      });
    }
    return `https://www.google.com/maps/search/?api=1&query=${dest}`;
  }

  const hasGPS=!!(branchLat&&branchLng);
  // Parse images from multiple possible formats
  let imgList=[];
  try{
    if(t.images){
      const parsed=typeof t.images==='string'?JSON.parse(t.images):t.images;
      if(Array.isArray(parsed)) imgList=parsed;
      else if(typeof parsed==='string') imgList=[parsed];
    }
  }catch(_){
    // If JSON parse fails, try splitting by comma
    if(typeof t.images==='string'&&t.images.trim()) imgList=t.images.split(',').map(s=>s.trim()).filter(Boolean);
  }
  // Ensure URLs are absolute
  imgList=imgList.map(u=>{
    if(!u)return'';
    if(u.startsWith('http'))return u;
    if(u.startsWith('/'))return u;
    return'/uploads/'+u;
  }).filter(Boolean);

  // รูปผู้แจ้ง
  let reporterImgs=[];
  try{if(t.images_reporter){const p=typeof t.images_reporter==='string'?JSON.parse(t.images_reporter):t.images_reporter;reporterImgs=Array.isArray(p)?p.map(x=>typeof x==='object'?x:{url:x,thumb:x}):[];}}catch(_){}
  // รูปช่าง
  let engineerImgs=[];
  try{if(t.images_engineer){const p=typeof t.images_engineer==='string'?JSON.parse(t.images_engineer):t.images_engineer;engineerImgs=Array.isArray(p)?p.map(x=>typeof x==='object'?x:{url:x,thumb:x}):[];}}catch(_){}
  // รวมสำหรับ lightbox
  const allImgs=[...reporterImgs,...engineerImgs];
  function makeStrip(imgs,label,color,startIdx){
    if(!imgs.length)return'';
    const thumbs=imgs.map((img,i)=>`<div onclick="openEngLB(${startIdx+i})" style="flex-shrink:0;width:72px;height:72px;border-radius:8px;overflow:hidden;cursor:pointer;border:0.5px solid var(--border);position:relative"><img src="${img.thumb||img.url}" style="width:100%;height:100%;object-fit:cover" onerror="this.src='${img.url}'"><span style="position:absolute;bottom:3px;left:3px;font-size:9px;padding:1px 4px;border-radius:3px;background:${color}22;color:${color};font-weight:700">${label}</span></div>`).join('');
    return`<div style="margin-top:10px"><div style="font-size:11px;color:var(--fg4);font-weight:700;margin-bottom:6px">${label==='ก่อน'?'📷 รูปผู้แจ้ง':'🔧 รูปช่าง'} (${imgs.length})</div><div style="display:flex;gap:6px;overflow-x:auto;padding-bottom:4px">${thumbs}</div></div>`;
  }
  const imgHtml=(reporterImgs.length||engineerImgs.length)?
    makeStrip(reporterImgs,'ก่อน','#E24B4A',0)+

// เปิด Google Maps นำทาง จาก GPS ปัจจุบัน → สาขา
// Cache GPS สำหรับใช้นำทางทันที (ไม่ต้องรอ getCurrentPosition)
let _lastGPS=null;

function openEngLB(i){
  const imgs=window._engLBImgs||[];
  if(!imgs.length)return;
  window._engLBCur=i;
  const lb=document.getElementById('eng-lb-bg');
  if(!lb)return;
  lb.style.display='flex';
  document.getElementById('eng-lb-img').src=imgs[i].url||imgs[i];
  document.getElementById('eng-lb-label').textContent=(i+1)+'/'+imgs.length;
}
function navEngLB(d){
  const imgs=window._engLBImgs||[];
  window._engLBCur=(window._engLBCur+d+imgs.length)%imgs.length;
  openEngLB(window._engLBCur);
}

function openBranchMap(rid){
  const t=tickets.find(x=>x._recordId===rid);if(!t)return;
  const gpsMatch=(t.location||'').match(/\[(GPS|DB):([-\d.]+),([-\d.]+)\]/);
  if(!gpsMatch){toast('ไม่มีข้อมูลพิกัด GPS สาขา');return;}
  const destLat=gpsMatch[2], destLng=gpsMatch[3];

  // ใช้ cached GPS → เปิด Maps ทันที (ไม่ต้องรอ 5 วิ)
  if(_lastGPS){
    window.open(`https://www.google.com/maps/dir/?api=1&origin=${_lastGPS.lat},${_lastGPS.lng}&destination=${destLat},${destLng}&travelmode=driving`,'_blank');
    return;
  }
  // ถ้าไม่มี cache → เปิด Maps แบบไม่ระบุ origin (Google จะใช้ GPS มือถือเอง)
  window.open(`https://www.google.com/maps/dir/?api=1&destination=${destLat},${destLng}&travelmode=driving`,'_blank');
}
let toastT;
function toast(m){const el=document.getElementById('toast');el.textContent=m;el.style.display='block';el.style.animation='none';el.offsetHeight;el.style.animation='';clearTimeout(toastT);toastT=setTimeout(()=>el.style.display='none',2500);}

let pvOpen=false,pvPendRole='',pvPendPage='',pvTimer=null,pvCurRole='',pvCurPage='Engineer';

function initPreviewRole(){
  pvCurRole=AUTH?.user?.role||'';
  if(pvCurRole==='superadmin'){

function pvToggle(){
  pvOpen=!pvOpen;
  const drop=document.getElementById('pv-drop'),trig=document.getElementById('pv-trigger');
  drop.classList.toggle('open',pvOpen);trig.classList.toggle('open',pvOpen);
  if(pvOpen)pvStartTimer();else pvClearTimer();
}
function pvClose(){
  pvOpen=false;
  document.getElementById('pv-drop').classList.remove('open');
  document.getElementById('pv-trigger').classList.remove('open');
  pvClearTimer();
}
function pvStartTimer(){
  pvClearTimer();
  const bar=document.getElementById('pv-timer');
  bar.style.transition='none';bar.style.width='100%';
  requestAnimationFrame(()=>requestAnimationFrame(()=>{bar.style.transition='width 5s linear';bar.style.width='0%';}));
  pvTimer=setTimeout(()=>pvClose(),5000);
}
function pvClearTimer(){
  if(pvTimer){clearTimeout(pvTimer);pvTimer=null;}
  const bar=document.getElementById('pv-timer');bar.style.transition='none';bar.style.width='100%';
}
function pvPickRole(el,role,page){
  document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.remove('active'));

function pvConfirm(){
  const btn=document.getElementById('pv-ok-btn');
  btn.classList.add('go');btn.textContent='🔐 กำลังเปลี่ยน...';pvClearTimer();
  setTimeout(()=>{
    btn.classList.remove('go');btn.textContent='🔏 ยืนยัน';
    document.getElementById('pv-hint').textContent='เลือก role แล้วกด ✓';
    pvClose();

      pvCurRole=pvPendRole;pvCurPage=pvPendPage;
      document.getElementById('pv-t-role').textContent=pvCurRole;
      document.querySelectorAll('.pv-ropt').forEach(b=>b.classList.toggle('active',b.textContent.trim().startsWith(pvCurRole)));
      if(['superadmin','manager','admin','guest'].includes(pvPendRole)&&pvPendPage==='Admin')window.location.href='/admin';

function pvShowLoading(fr,tr,fp,tp,cb){
  const ov=document.getElementById('pv-overlay');
  const slR=document.getElementById('pvo-sl-role'),slP=document.getElementById('pvo-sl-page'),pSt=document.getElementById('pvo-p-static');
  const rc=fr!==tr,pc=fp!==tp;
  document.getElementById('pvo-r-old').textContent=fr;document.getElementById('pvo-r-new').textContent=tr;
  document.getElementById('pvo-p-old').textContent=fp+' Portal';document.getElementById('pvo-p-new').textContent=tp+' Portal';
  pSt.textContent=fp+' Portal';
  slR.classList.remove('do-flip');slP.classList.remove('do-flip');
  ['pvo-r-old','pvo-r-new','pvo-p-old','pvo-p-new'].forEach(id=>{const el=document.getElementById(id);el.style.animation='none';el.offsetHeight;el.style.animation='';});
  ['pvo-r-old','pvo-p-old'].forEach(id=>{const el=document.getElementById(id);el.style.opacity='1';el.style.transform='rotateX(0)';});
  ['pvo-r-new','pvo-p-new'].forEach(id=>{const el=document.getElementById(id);el.style.opacity='0';el.style.transform='rotateX(90deg)';});
  slR.style.display='flex';slP.style.display=pc?'flex':'none';pSt.style.display=pc?'none':'block';
  ov.style.animation='';ov.style.opacity='1';ov.style.display='flex';
  if(rc)setTimeout(()=>slR.classList.add('do-flip'),700);
  if(pc)setTimeout(()=>slP.classList.add('do-flip'),rc?1200:700);
  const total=(pc&&rc)?2800:2200;
  setTimeout(()=>{ov.style.animation='pvOut .45s ease forwards';setTimeout(()=>{ov.style.display='none';ov.style.animation='';if(cb)cb();},450);},total);
}

function _renderJobTable(containerId, isActive){
  const tabKey = containerId.replace('tab-','');
  const el = document.getElementById('jt-list-'+tabKey);
  if(!el) return;
  const s = window._jtState[tabKey];
  if(!s||!s.list) return;
  const role = AUTH?.user?.role||'';
  const isGuest = role==='guest';
  const stKey = 'eng_st_'+(AUTH?.user?.id||'x');
  let sv={};try{sv=JSON.parse(localStorage.getItem(stKey)||'{}');}catch(_){}

  // Filter
  let filtered = s.list.filter(t=>{
    if(!s.search) return true;
    const q=s.search.toLowerCase();
    return (t.id||'').toLowerCase().includes(q)||
           (t.type||'').toLowerCase().includes(q)||
           cleanBranch(t.branchCode).toLowerCase().includes(q)||
           formatBranch(t.branchCode).toLowerCase().includes(q)||
           (t.brand||'').toLowerCase().includes(q);
  });
  const total = filtered.length;
  const totalPages = Math.max(1,Math.ceil(total/s.perPage));
  if(s.page>totalPages) s.page=totalPages;
  const start = (s.page-1)*s.perPage;
  const pageItems = filtered.slice(start,start+s.perPage);

  const lbl=document.getElementById('jt-count-'+tabKey);
  if(lbl) lbl.textContent=`${total} รายการ`;

  if(!total){
    el.innerHTML=`<div class="empty"><div class="empty-t">${isActive?'ยังไม่มีงานที่รับ':'ยังไม่มีงานในหมวดนี้'}</div><div class="empty-d">ระบบจะอัปเดทแบบ real-time</div></div>`;
    return;
  }

  const rows = pageItems.map((t,i)=>{
    const rid = esc(t._recordId||'');
    const isPending  = /pending|รอดำเนินการ/.test(t.status||'');
    const isAssigned = /assigned|มอบหมาย/.test(t.status||'');
    const isAccepted = /accepted|รับงาน/.test(t.status||'');
    const isWorking  = /in_progress|ระหว่าง/.test(t.status||'');
    const isWaitingParts  = /รออะไหล่|waiting_parts/.test(t.status||'');
    const isWaitingVendor = /รอซัพ|waiting_vendor/.test(t.status||'');
    const isReview   = /ตรวจ|review/.test(t.status||'');
    const isDone     = /เสร็จ|completed/.test(t.status||'');
    const sa = sv[t._recordId]||null;
    const hasStarted = isWorking&&!!sa;
    const gpsMatch = (t.location||'').match(/\[(GPS|DB):([-\d.]+),([-\d.]+)\]/);
    const hasGPS = !!gpsMatch;

    // Status pill
    const sl=(t.status||'').toLowerCase();
    let pillCls='hs-wait';
    if(/เสร็จ|complete|done/.test(sl))  pillCls='hs-done';
    else if(/ตรวจ|review/.test(sl))     pillCls='hs-rev';
    else if(/รออะไหล่|waiting_parts/.test(sl))  pillCls='hs-parts';
    else if(/รอซัพ|waiting_vendor/.test(sl))    pillCls='hs-vendor';
    else if(/ระหว่าง|progress/.test(sl)) pillCls='hs-work';
    else if(/ยกเลิก|cancel/.test(sl))   pillCls='hs-cancel';

    // Action buttons
    let btns='';
    if(!isGuest){
      if(hasGPS) btns+=`<button class="jt-b nav" onclick="event.stopPropagation();openBranchMap('${rid}')">🗺️</button>`;
      if(isActive){
        if(isPending||isAssigned||isAccepted)
          btns+=`<button class="jt-b accept" onclick="event.stopPropagation();doAccept('${rid}')">รับงาน</button>`;
        else if(isWorking&&!hasStarted)
          btns+=`<button class="jt-b start" onclick="event.stopPropagation();doStartWork('${rid}')">เริ่มงาน</button>`;
        else if(hasStarted){
          btns+=`<button class="jt-b submit" onclick="event.stopPropagation();openSubmit('${rid}')">ส่งงาน</button>`;
          btns+=`<button class="jt-b" style="color:#a855f7;border-color:#a855f7" onclick="event.stopPropagation();openStuckStatus('${rid}')">📦 ติดขัด</button>`;
        }
        else if(isWaitingParts||isWaitingVendor)
          btns+=`<button class="jt-b start" onclick="event.stopPropagation();doResumeWork('${rid}')">▶️ ดำเนินการต่อ</button>`;
      }
    }
    btns+=`<button class="jt-b" onclick="event.stopPropagation();openDetail('${rid}')">Detail</button>`;

    // Timer cell
    const timerCell = hasStarted
      ? `<div class="jt-timer" id="timer-${esc(t._recordId)}">00:00:00</div>`
      : '';

    return `<tr class="htr" onclick="openDetail('${rid}')" style="animation:up .18s var(--ease) ${i*.03}s both">
      <td style="color:var(--fg4);font-size:11px;font-weight:600">${start+i+1}</td>
      <td>
        <div style="font-family:var(--mono);font-size:11px;font-weight:600;color:var(--fg)">${esc(t.id||'--')}</div>
        <div style="font-size:10px;color:var(--fg4);margin-top:1px">${esc(t.brand||'')}${hasGPS?' 📍':''}</div>
        ${timerCell}
      </td>
      <td style="font-weight:600;color:var(--fg);min-width:110px">${esc(t.type||'-')}</td>
      <td style="font-size:12px;color:var(--fg2);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(formatBranch(t.branchCode))}</td>
      <td><span class="hs-pill ${pillCls}">${statusLabel(t.status)}</span></td>
      <td style="font-size:11px;color:var(--fg4);white-space:nowrap;font-family:var(--mono)">${esc((t.sentDate||'-').slice(0,10))}</td>
      <td onclick="event.stopPropagation()"><div class="jt-act">${btns}</div></td>
    </tr>`;
  }).join('');

  // Pagination
  let pgHtml='';
  if(totalPages>1){
    const btn=(lbl,p,dis=false,active=false)=>
      `<button class="pg-btn${active?' on':''}" ${dis?'disabled':''} onclick="window._jtState['${tabKey}'].page=${p};_renderJobTable('${containerId}',${isActive})">${lbl}</button>`;
    let pages=[];
    for(let p=1;p<=totalPages;p++){
      if(p===1||p===totalPages||Math.abs(p-s.page)<=2) pages.push(p);
      else if(Math.abs(p-s.page)===3&&!pages.includes('…')) pages.push('…');
    }
    pgHtml=`<div class="pg">
      <span class="pg-info">แสดง ${start+1}–${Math.min(start+s.perPage,total)} จาก ${total}</span>
      ${btn('หน้าแรกสุด',1,s.page===1)}
      ${btn('◄ ก่อนหน้า',s.page-1,s.page===1)}
      ${pages.map(p=>p==='…'?`<span class="pg-btn" style="cursor:default;border-color:transparent;background:transparent">…</span>`:btn(p,p,false,p===s.page)).join('')}
      ${btn('ถัดไป ►',s.page+1,s.page===totalPages)}
      ${btn('หน้าสุดท้าย',totalPages,s.page===totalPages)}
    </div>`;
  }

  el.innerHTML=`<div class="htbl-wrap">
    <table class="htbl">
      <thead><tr>
        <th>#</th><th>รหัส / แบรนด์</th><th>ประเภทงาน</th><th>สาขา</th><th>สถานะ</th><th>วันที่</th><th>Actions</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>${pgHtml}`;

  startWorkTimers();
}

let _histFrom='', _histTo='', _histPage=1, _histPerPage=10, _histBrand='', _histSearch='', _histAllData=[];

  const el = document.getElementById('tab-history');

          document.getElementById('hist-brand').value='';
          loadEngHistory()">ทั้งหมด</button>

async function loadEngHistory(){
  const el = document.getElementById('hist-list');
  if(!el) return;
  el.innerHTML = '<div style="color:var(--fg4);text-align:center;padding:40px;font-size:13px">⏳ กำลังโหลด...</div>';
  try {
    const engName = AUTH?.user?.name || '';
    const engUser = AUTH?.user?.username || '';
    const role = AUTH?.user?.role || '';
    const canSeeAll = ['admin','superadmin','manager'].includes(role);
    let url = `/api/tickets?limit=500`;
    if(_histFrom) url += `&from=${_histFrom}`;
    if(_histTo)   url += `&to=${_histTo}T23:59:59`;
    const d = await fetch(url,{headers:{Authorization:`Bearer ${localStorage.getItem('eng_auth')}`}}).then(r=>r.json());
    let allTix = d.tickets||d.data||[];
    let list;
    if(canSeeAll){
      list = allTix;
    } else {
      list = allTix.filter(t=>{
        const en=(t.engineerName||t.engineer_name||t.assignedTo||'').toLowerCase();
        return en&&(en===engName.toLowerCase()||en===engUser.toLowerCase());
      });
    }
    _histAllData = list.sort((a,b)=>new Date(b.sentDate||0)-new Date(a.sentDate||0));
    _renderHistTable(false);
  } catch(e) {
    let all = [...tickets].sort((a,b)=>new Date(b.sentDate||0)-new Date(a.sentDate||0));
    if(_histFrom) all=all.filter(t=>new Date(t.sentDate||0)>=new Date(_histFrom));
    if(_histTo)   all=all.filter(t=>new Date(t.sentDate||0)<=new Date(_histTo+'T23:59:59'));
    _histAllData = all;
    _renderHistTable(true);
  }
}

function _histStatusPill(s){
  const sl=(s||'').toLowerCase();
  if(/เสร็จ|complete|done/.test(sl))  return`<span class="hs-pill hs-done">${statusLabel(s)}</span>`;
  if(/ตรวจ|review/.test(sl))          return`<span class="hs-pill hs-rev">${statusLabel(s)}</span>`;
  if(/รออะไหล่|waiting_parts/.test(sl))  return`<span class="hs-pill hs-parts">${statusLabel(s)}</span>`;
  if(/รอซัพ|waiting_vendor/.test(sl))    return`<span class="hs-pill hs-vendor">${statusLabel(s)}</span>`;
  if(/ระหว่าง|progress|working/.test(sl)) return`<span class="hs-pill hs-work">${statusLabel(s)}</span>`;
  if(/ยกเลิก|cancel/.test(sl))        return`<span class="hs-pill hs-cancel">${statusLabel(s)}</span>`;
  return`<span class="hs-pill hs-wait">${statusLabel(s)||'รอ'}</span>`;
}

function _renderHistTable(fromCache=false){
  const el=document.getElementById('hist-list');
  if(!el)return;
  // Apply client-side filters
  let filtered=_histAllData.filter(t=>{
    if(_histBrand&&t.brand!==_histBrand)return false;
    if(_histSearch){
      const q=_histSearch.toLowerCase();
      const id=(t.id||t.ticket_id||'').toLowerCase();
      const br=cleanBranch(t.branchCode).toLowerCase();
      const brFmt=formatBranch(t.branchCode).toLowerCase();
      const tp=(t.type||'').toLowerCase();
      if(!id.includes(q)&&!br.includes(q)&&!brFmt.includes(q)&&!tp.includes(q))return false;
    }
    return true;
  });
  const total=filtered.length;
  const totalPages=Math.max(1,Math.ceil(total/_histPerPage));
  if(_histPage>totalPages)_histPage=totalPages;
  const start=(_histPage-1)*_histPerPage;
  const pageItems=filtered.slice(start,start+_histPerPage);
  // Update count
  const lbl=document.getElementById('hist-count-lbl');
  if(lbl)lbl.textContent=`พบ ${total} รายการ${fromCache?' (จาก cache)':''}`;
  if(!total){
    el.innerHTML=`<div class="empty"><div class="empty-t">ไม่พบประวัติ</div><div class="empty-d">ลองเปลี่ยนตัวกรองหรือช่วงวันที่</div></div>`;
    return;
  }
  const rows=pageItems.map((t,i)=>{
    const rid=esc(t._recordId||'');
    const clickFn=rid?`onclick="openDetail('${rid}')"`:'' ;
    return`<tr class="htr" ${clickFn} style="animation:up .2s var(--ease) ${i*.03}s both">
      <td style="color:var(--fg4);font-family:var(--display);font-size:11px;font-weight:600">${start+i+1}</td>
      <td style="font-family:var(--mono);font-size:11px;color:var(--fg4);white-space:nowrap">${esc(t.id||t.ticket_id||'--')}</td>
      <td style="font-weight:600;color:var(--fg)">${esc(t.type||'-')}</td>
      <td style="font-size:12px;color:var(--fg2);max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(formatBranch(t.branchCode))}</td>
      <td><span class="br-badge-sm">${esc(t.brand||'-')}</span></td>
      <td>${_histStatusPill(t.status)}</td>
      <td style="font-size:11px;color:var(--fg4);white-space:nowrap;font-family:var(--mono)">${esc((t.sentDate||'-').slice(0,10))}</td>
    </tr>`;
  }).join('');
  // Pagination
  let pgHtml='';
  if(totalPages>1){
    const btn=(lbl,p,dis=false,active=false)=>
      `<button class="pg-btn${active?' on':''}" ${dis?'disabled':''} onclick="_histPage=${p};_renderHistTable(${fromCache})">${lbl}</button>`;
    let pages=[];
    for(let p=1;p<=totalPages;p++){
      if(p===1||p===totalPages||Math.abs(p-_histPage)<=2)pages.push(p);
      else if(Math.abs(p-_histPage)===3&&!pages.includes('…'))pages.push('…');
    }
    pgHtml=`<div class="pg">
      <span class="pg-info">แสดง ${start+1}–${Math.min(start+_histPerPage,total)} จาก ${total}</span>
      ${btn('หน้าแรกสุด',1,_histPage===1)}
      ${btn('◄ ก่อนหน้า',_histPage-1,_histPage===1)}
      ${pages.map(p=>p==='…'?`<span class="pg-btn" style="cursor:default;border-color:transparent;background:transparent">…</span>`:btn(p,p,false,p===_histPage)).join('')}
      ${btn('ถัดไป ►',_histPage+1,_histPage===totalPages)}
      ${btn('หน้าสุดท้าย',totalPages,_histPage===totalPages)}
    </div>`;
  }
  el.innerHTML=`<div class="htbl-wrap">
    <table class="htbl">
      <thead><tr>
        <th>#</th><th>รหัส</th><th>ประเภทงาน</th><th>สาขา</th><th>แบรนด์</th><th>สถานะ</th><th>วันที่</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>${pgHtml}`;
}

function makeTog(label,sub,initOn,key){
  const on = localStorage.getItem('etog_'+key)==='true' || (initOn&&localStorage.getItem('etog_'+key)===null);
  return `<div class="tog-row" onclick="engTogSet('${key}',this)">
    <div><div class="tog-label">${label}</div><div class="tog-sub">${sub}</div></div>
    <div class="tog${on?' on':''}"></div>

}
function engTogSet(key,row){
  const tog=row.querySelector('.tog');
  const on=tog.classList.toggle('on');

  if(key==='eng_dark'){document.documentElement.dataset.t=on?'dark':'';localStorage.setItem('eng_theme',on?'dark':'');}
  toast(on?'เปิดใช้งาน':'ปิดใช้งาน');
}
